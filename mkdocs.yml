site_name: Cadencia Docs
site_description: Como a Cadencia funciona — sistemas, processos, infra e framework de IA.
site_url: https://docs.cadencia.app.br
repo_url: https://github.com/Posicionamento-Digital/cadencia-docs
repo_name: cadencia-docs

docs_dir: docs
site_dir: site

theme:
  name: material
  language: pt-BR
  custom_dir: docs/overrides
  logo: assets/logo.svg
  favicon: assets/logo.svg
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: custom
      accent: custom
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.path
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - navigation.prune
    - toc.follow
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy

extra_css:
  - stylesheets/cadencia.css

extra_javascript:
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Posicionamento-Digital

hooks:
  - docs/hooks.py

plugins:
  - search:
      lang: pt
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md

