site_name: Cadencia Docs
site_description: Documentação técnica dos produtos Cadencia
site_url: https://posicionamento-digital.github.io/cadencia-docs/
repo_url: https://github.com/Posicionamento-Digital/cadencia-docs
repo_name: cadencia-docs

docs_dir: docs
site_dir: site

theme:
  name: material
  language: pt-BR
  logo: null
  favicon: null
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Modo escuro
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Modo claro
  features:
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - toc.follow

extra_css:
  - stylesheets/cadencia.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Posicionamento-Digital

plugins:
  - search:
      lang: pt
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

